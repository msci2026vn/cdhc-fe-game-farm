<svg viewBox="0 0 200 200" height="200" width="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient r="60%" cy="40%" cx="50%" id="coreGrad">
      <stop stop-color="#7cb518" offset="0%"></stop>
      <stop stop-color="#3d7500" offset="100%"></stop>
    </radialGradient>
    <radialGradient r="50%" cy="50%" cx="50%" id="spotGrad">
      <stop stop-color="#4a0080" offset="0%"></stop>
      <stop stop-color="#1a0030" offset="100%"></stop>
    </radialGradient>
  </defs>

  
  <g>
    
    <animateTransform repeatCount="indefinite" dur="3.2s" values="0,0; 0,-4; 0,0" type="translate" attributeName="transform"></animateTransform>

    <animateTransform origin="100 105" repeatCount="indefinite" dur="3.2s" values="1,1; 1.035,1.035; 1,1" additive="sum" type="scale" attributeName="transform"></animateTransform>

    
    <g>
      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q60,50 30,40">
        
      </path>

      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q80,40 90,15">
        
      </path>

      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q140,50 170,40">
        
      </path>

      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q120,40 110,15">
        
      </path>

      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q50,110 20,130"></path>
      <path stroke-linecap="round" fill="none" stroke-width="4" stroke="#3d7500" d="M100,100 Q150,110 180,130"></path>
    </g>

    
    <ellipse transform="rotate(-30 30 38)" fill="#7cb518" ry="10" rx="18" cy="38" cx="30"></ellipse>
    <ellipse transform="rotate(-30 30 38)" opacity="0.7" fill="#4a0080" ry="5" rx="8" cy="38" cx="30"></ellipse>
    <ellipse transform="rotate(30 170 38)" fill="#7cb518" ry="10" rx="18" cy="38" cx="170"></ellipse>
    <ellipse transform="rotate(30 170 38)" opacity="0.7" fill="#4a0080" ry="5" rx="8" cy="38" cx="170"></ellipse>
    <ellipse transform="rotate(-10 90 15)" fill="#7cb518" ry="9" rx="15" cy="13" cx="90"></ellipse>
    <ellipse opacity="0.7" fill="#4a0080" ry="4" rx="7" cy="13" cx="90"></ellipse>

    
    <circle fill="url(#coreGrad)" r="42" cy="105" cx="100"></circle>

    
    <circle opacity="0.85" fill="url(#spotGrad)" r="12" cy="95" cx="85"></circle>
    <circle opacity="0.85" fill="url(#spotGrad)" r="9" cy="110" cx="112"></circle>
    <circle opacity="0.7" fill="url(#spotGrad)" r="7" cy="120" cx="90"></circle>

    
    <g>
      <circle fill="#ffe066" r="6" cy="98" cx="90"></circle>
      <circle fill="#ffe066" r="6" cy="98" cx="112"></circle>

      
      <circle fill="#000" r="3" cy="98" cx="90">
        
      </circle>
      <circle fill="#000" r="3" cy="98" cx="112">
        
      </circle>
    </g>

    
    <path stroke-linecap="round" fill="none" stroke-width="2.5" stroke="#1a5000" d="M83,115 Q100,128 118,115">
      
    </path>

    
    <circle opacity="0.8" fill="#a8e063" r="4" cy="70" cx="60">
      
      
    </circle>
    <circle opacity="0.8" fill="#a8e063" r="4" cy="70" cx="140">
      
      
    </circle>
    <circle opacity="0.6" fill="#a8e063" r="3" cy="55" cx="75">
      
    </circle>
    <circle opacity="0.6" fill="#a8e063" r="3" cy="55" cx="125">
      
    </circle>
    <circle opacity="0.6" fill="#a8e063" r="3" cy="50" cx="100">
      
