<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bob { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-4px) rotate(-1deg); } }
    @keyframes propSpin { 0% { transform: scaleX(1); } 50% { transform: scaleX(0.1); } 100% { transform: scaleX(1); } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .plane { animation: bob 2s infinite alternate ease-in-out; transform-origin: center; }
    .prop { animation: propSpin 0.1s infinite linear; transform-origin: center right; }
    .cloud { animation: cloudMove 10s infinite linear; }
    .cloud2 { animation: cloudMove 8s infinite linear reverse; }
  </style>
  
  <rect width="200" height="150" fill="#90caf9" />
  <!-- Fast Clouds for flight effect -->
  <g fill="#FFF" opacity="0.9" class="cloud" transform="translate(150, 40) scale(0.7)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>
  <g fill="#FFF" opacity="0.5" class="cloud2" transform="translate(50, 100) scale(0.5)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>
  <!-- Background Sun -->
  <circle cx="160" cy="40" r="20" fill="#ffee58"/>

  <g class="plane" transform="translate(0, 0)">
    <!-- Character: Caterpillar -->
    <g transform="translate(85, 80)">
      <path d="M-10,0 Q-15,-20 0,-30 Q15,-20 10,0 Z" fill="#cddc39" stroke="#9e9d24" stroke-width="1.5"/>
      <!-- Aviator Goggles -->
      <rect x="-8" y="-22" width="16" height="8" rx="2" fill="#795548" />
      <circle cx="-3" cy="-18" r="3" fill="#e0f7fa"/>
      <circle cx="3" cy="-18" r="3" fill="#e0f7fa"/>
      <!-- Cape -->
      <path d="M-10,-5 Q-30,0 -40,15 Q-20,10 -10,5 Z" fill="#d32f2f"/>
    </g>

    <!-- Plane: Twig -->
    <g transform="translate(100, 90)">
      <!-- Fuselage -->
      <path d="M-50,0 Q-40,10 30,5 L40,0 L30,-5 Q-40,-10 -50,0 Z" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
      <!-- Wing -->
      <path d="M-20,0 L20,0 L10,10 L-10,10 Z" fill="#a1887f" stroke="#5d4037" stroke-width="1.5"/>
      <!-- Tail -->
      <path d="M-45,0 L-50,-15 L-35,-5 Z" fill="#a1887f" stroke="#5d4037" stroke-width="1.5"/>
      <!-- Propeller Cone -->
      <path d="M40,-3 L45,0 L40,3 Z" fill="#424242"/>
    </g>

    <!-- Propeller Blade -->
    <g transform="translate(145, 90)">
      <ellipse cx="0" cy="0" rx="3" ry="18" fill="#e0e0e0" class="prop" opacity="0.8"/>
    </g>
  </g>
</svg>
