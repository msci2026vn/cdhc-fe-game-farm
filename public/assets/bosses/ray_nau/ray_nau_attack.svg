<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 190" height="190" width="220">
  <defs>
    <style>
      @keyframes attackJump {
        0%, 100% { transform: translate(0,0) rotate(0deg); }
        35% { transform: translate(35px, -32px) rotate(-15deg); }
        65% { transform: translate(18px, -8px) rotate(10deg); }
      }
      @keyframes wingAttack { 
        0%,100%{transform:rotate(0deg);} 
        45%{transform:rotate(48deg);} 
      }
      
      .attackGroup { animation: attackJump 0.65s infinite ease-in-out; }
      .wingAttack { animation: wingAttack 0.65s infinite ease-in-out; transform-origin: 105px 82px; }
    </style>
  </defs>

  <g class="attackGroup">
    
    
    <ellipse cx="105" cy="98" rx="29" ry="47" fill="#8B5F2F" transform="rotate(-5 105 98)"></ellipse>
    <ellipse cx="105" cy="83" rx="23" ry="19" fill="#A67C52" transform="rotate(-5 105 98)"></ellipse>

    
    <ellipse cx="105" cy="53" rx="19" ry="21" fill="#6D4625"></ellipse>
    <circle cx="96" cy="50" r="6" fill="#E04E2F"></circle>
    <circle cx="114" cy="50" r="6" fill="#E04E2F"></circle>

    
    <path stroke-width="4" stroke="#5C3F24" fill-opacity="0.82" fill="#EDE4C9" d="M73 68 Q28 25 25 72 Q48 118 80 95 Z" class="wingAttack"></path>
    <path stroke-width="4" stroke="#5C3F24" fill-opacity="0.82" fill="#EDE4C9" d="M137 68 Q182 25 185 72 Q162 118 130 95 Z" class="wingAttack"></path>

    
    
    <path stroke-linecap="round" stroke-width="7" stroke="#3F2A1A" fill="none" d="M77 130 Q68 165 65 178"></path>
    
    <path stroke-linecap="round" stroke-width="7" stroke="#3F2A1A" fill="none" d="M133 130 Q142 165 145 178"></path>

  </g>
</svg>
