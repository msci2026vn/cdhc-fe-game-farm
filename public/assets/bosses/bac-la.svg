<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6b9e2a"/>
      <stop offset="100%" stop-color="#2d4d00"/>
    </radialGradient>
    <radialGradient id="wingGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#456b10"/>
    </radialGradient>
  </defs>
  <!-- Wings -->
  <ellipse cx="60" cy="80" rx="50" ry="25" fill="url(#wingGrad)" opacity="0.85" transform="rotate(-15,60,80)"/>
  <ellipse cx="140" cy="80" rx="50" ry="25" fill="url(#wingGrad)" opacity="0.85" transform="rotate(15,140,80)"/>
  <!-- Wing vein lines -->
  <path d="M100,80 Q75,70 35,60" stroke="#2d4d00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M100,80 Q80,75 50,90" stroke="#2d4d00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M100,80 Q125,70 165,60" stroke="#2d4d00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M100,80 Q120,75 150,90" stroke="#2d4d00" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Body segments -->
  <ellipse cx="100" cy="80" rx="16" ry="22" fill="url(#bodyGrad)"/>
  <ellipse cx="100" cy="110" rx="18" ry="20" fill="url(#bodyGrad)"/>
  <ellipse cx="100" cy="140" rx="15" ry="18" fill="#4a7a11"/>
  <ellipse cx="100" cy="165" rx="10" ry="14" fill="#3a5e0d"/>
  <!-- Head -->
  <ellipse cx="100" cy="58" rx="16" ry="14" fill="url(#bodyGrad)"/>
  <!-- Antennae -->
  <path d="M94,48 Q80,25 70,15" stroke="#2d4d00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M106,48 Q120,25 130,15" stroke="#2d4d00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="15" r="4" fill="#8cc63f"/>
  <circle cx="130" cy="15" r="4" fill="#8cc63f"/>
  <!-- Eyes -->
  <circle cx="93" cy="58" r="5" fill="#ffe066"/>
  <circle cx="107" cy="58" r="5" fill="#ffe066"/>
  <circle cx="93" cy="58" r="2.5" fill="#1a3300"/>
  <circle cx="107" cy="58" r="2.5" fill="#1a3300"/>
  <!-- Legs -->
  <line x1="88" y1="108" x2="55" y2="95" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="112" x2="50" y2="115" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="117" x2="60" y2="135" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="108" x2="145" y2="95" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="112" x2="150" y2="115" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="117" x2="140" y2="135" stroke="#3a5e0d" stroke-width="3" stroke-linecap="round"/>
  <!-- Body stripe -->
  <line x1="100" y1="88" x2="100" y2="180" stroke="#1a3300" stroke-width="2" opacity="0.4"/>
</svg>
