<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes trundle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px) rotate(1deg); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes exhaust { 0% { transform: scale(0.5) translateY(0); opacity: 0.8; } 100% { transform: scale(1.5) translateY(-20px); opacity: 0; } }
    .car { animation: trundle 1.2s infinite alternate ease-in-out; transform-origin: center; }
    .wheel { animation: wheelSpin 1.4s infinite linear; transform-origin: center; }
    .smoke1 { animation: exhaust 2s infinite ease-out; }
    .smoke2 { animation: exhaust 2s infinite ease-out 1s; }
  </style>
  
  <rect width="200" height="150" fill="#a1887f" />

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#3e2723" />
  <g stroke="#8d6e63" stroke-width="3" stroke-dasharray="10 20">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>

  <!-- Exhaust Smoke Base -->
  <g transform="translate(45, 95)">
    <circle cx="0" cy="0" r="12" fill="#81c784" stroke="#4caf50" stroke-width="1" class="smoke1" opacity="0" />
    <circle cx="0" cy="0" r="10" fill="#aed581" stroke="#4caf50" stroke-width="1" class="smoke2" opacity="0" />
  </g>

  <g class="car" transform="translate(0, 0)">
    <!-- Character: Stink Bug -->
    <g transform="translate(100, 80)">
      <!-- Shield Body -->
      <path d="M-15,-20 L0,-35 L15,-20 L10,5 L-10,5 Z" fill="#795548" stroke="#3e2723" stroke-width="2"/>
      <path d="M-10,-15 L0,-25 L10,-15" fill="none" stroke="#a1887f" stroke-width="1.5"/>
      <!-- Eyes w/ Gas Mask Vibe -->
      <circle cx="-5" cy="-25" r="4" fill="#111" stroke="#66bb6a" stroke-width="1.5"/>
      <circle cx="5" cy="-25" r="4" fill="#111" stroke="#66bb6a" stroke-width="1.5"/>
      <path d="M-2,-20 Q0,-15 2,-20" fill="none" stroke="#111" stroke-width="1.5"/>
    </g>

    <!-- Rusty Barrel Kart -->
    <g transform="translate(100, 95)">
      <!-- Main Barrel -->
      <rect x="-35" y="-15" width="60" height="30" rx="5" fill="#ffb74d" stroke="#e65100" stroke-width="2"/>
      <line x1="-35" y1="-5" x2="25" y2="-5" stroke="#ef6c00" stroke-width="1"/>
      <line x1="-35" y1="5" x2="25" y2="5" stroke="#ef6c00" stroke-width="1"/>
      <!-- Rust spots -->
      <path d="M-20,-10 Q-15,-5 -20,0 Z" fill="#e65100"/>
      <path d="M10,0 Q15,5 10,10 Z" fill="#e65100"/>
      
      <!-- Exhaust pipe -->
      <rect x="-50" y="-5" width="15" height="10" fill="#757575" stroke="#424242" stroke-width="1.5"/>
      <!-- Steering wheel -->
      <line x1="20" y1="-15" x2="30" y2="-25" stroke="#424242" stroke-width="2"/>
      <circle cx="30" cy="-25" r="4" fill="#d32f2f"/>
    </g>

    <!-- Wheels (Mismatched) -->
    <g transform="translate(75, 110)">
      <circle cx="0" cy="0" r="12" fill="#424242" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFF" stroke-width="2"/>
        <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFF" stroke-width="2"/>
      </g>
    </g>
    <g transform="translate(125, 112)">
      <circle cx="0" cy="0" r="10" fill="#212121" stroke="#aaa" stroke-width="1" />
      <g class="wheel">
        <circle cx="0" cy="0" r="4" fill="#9e9e9e"/>
      </g>
    </g>
  </g>
</svg>
