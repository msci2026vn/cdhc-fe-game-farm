  </g>

  <!-- ===== THÂN & ĐẦU VẼ SAU (layer trên) ===== -->
  <g class="spider-body">
    <ellipse fill="#C8102E" ry="74" rx="92" cy="167" cx="270"></ellipse>
    <ellipse fill="#E0223A" ry="55" rx="70" cy="167" cx="270"></ellipse>
    <path stroke-linecap="round" stroke-width="20" stroke="#FF6600" fill="none" d="M190 137 Q270 102 350 137"></path>
