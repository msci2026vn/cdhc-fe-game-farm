    <path stroke-linecap="round" stroke-width="17" stroke="#9B0000" fill="none" d="M235 316 Q175 305 150 338"></path>
    <path stroke-linecap="round" stroke-width="13" stroke="#B30000" fill="none" d="M150 338 Q120 358 135 398"></path>
