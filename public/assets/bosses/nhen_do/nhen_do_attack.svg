<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 500" height="500" width="540">
  <defs>
    <style>
      @keyframes leapForward {
        0%, 75%  { transform: translateY(0); }
        85%      { transform: translateY(-12px); }
        100%     { transform: translateY(0); }
      }

      
      /* Animation chân trước - nghỉ xòe rộng cao lên, bổ nhanh ra ngoài xuống */
      @keyframes leftFrontOuter {
        0%, 80%   { transform: rotate(145deg); }
        88%       { transform: rotate(-55deg); }
        95%       { transform: rotate(-45deg); }
        100%      { transform: rotate(145deg); }
      }

      @keyframes leftFrontInner {
        0%, 80%   { transform: rotate(130deg); }
        88%       { transform: rotate(-45deg); }
        95%       { transform: rotate(-35deg); }
        100%      { transform: rotate(130deg); }
      }

      @keyframes rightFrontOuter {
        0%, 80%   { transform: rotate(-145deg); }
        88%       { transform: rotate(55deg); }
        95%       { transform: rotate(45deg); }
        100%      { transform: rotate(-145deg); }
      }

      @keyframes rightFrontInner {
        0%, 80%   { transform: rotate(-130deg); }
        88%       { transform: rotate(45deg); }
        95%       { transform: rotate(35deg); }
        100%      { transform: rotate(-130deg); }
      }

      @keyframes mouthOpen {
        0%, 75%   { transform: rotate(0deg); }
        83%       { transform: rotate(30deg); }
        91%       { transform: rotate(10deg); }
        100%      { transform: rotate(0deg); }
      }

      .spider-body       { animation: leapForward 2s infinite ease-in-out; }
      .mouth             { animation: mouthOpen 2s infinite ease-in-out; transform-origin: 270px 315px; }

      .left-front-outer  { animation: leftFrontOuter 2s infinite ease-in; transform-origin: 235px 320px; }
      .left-front-inner  { animation: leftFrontInner 2s infinite ease-in; transform-origin: 235px 328px; animation-delay: 0.05s; }
      .right-front-outer { animation: rightFrontOuter 2s infinite ease-in; transform-origin: 305px 320px; animation-delay: 0.03s; }
      .right-front-inner { animation: rightFrontInner 2s infinite ease-in; transform-origin: 305px 328px; animation-delay: 0.08s; }
    </style>
  </defs>

  <!-- Bóng đổ -->
  <ellipse opacity="0.72" fill="#1A0000" ry="27" rx="120" cy="447" cx="270"></ellipse>

  <!-- ===== TẤT CẢ CHÂN VẼ TRƯỚC (layer dưới) ===== -->

  <!-- Chân sau trái 1 (ngoài cùng) -->
  <g>
    <path stroke-linecap="round" stroke-width="17" stroke="#9B0000" fill="none" d="M235 300 Q160 270 125 300"></path>
    <path stroke-linecap="round" stroke-width="13" stroke="#B30000" fill="none" d="M125 300 Q90 315 100 360"></path>
    <path stroke-linecap="round" stroke-width="11" stroke="#B30000" fill="none" d="M100 360 Q85 390 100 418"></path>
  </g>

  <!-- Chân sau trái 2 -->
  <g>
    <path stroke-linecap="round" stroke-width="17" stroke="#9B0000" fill="none" d="M235 308 Q168 285 138 318"></path>
    <path stroke-linecap="round" stroke-width="13" stroke="#B30000" fill="none" d="M138 318 Q105 335 118 378"></path>
    <path stroke-linecap="round" stroke-width="11" stroke="#B30000" fill="none" d="M118 378 Q105 405 120 430"></path>
  </g>

  <!-- Chân sau trái 3 -->
