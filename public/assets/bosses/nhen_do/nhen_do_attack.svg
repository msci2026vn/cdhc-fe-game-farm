    <path stroke-linecap="round" stroke-width="13" stroke="#B30000" fill="none" d="M390 338 Q420 358 405 398"></path>
    <path stroke-linecap="round" stroke-width="11" stroke="#B30000" fill="none" d="M405 398 Q418 422 402 445"></path>
  </g>

