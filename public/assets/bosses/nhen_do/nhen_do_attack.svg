  </g>

  <!-- Miệng -->
  <g class="mouth">
    <path stroke-linecap="round" stroke-width="14" stroke="#9B0000" fill="none" d="M245 300 Q217 307 208 342"></path>
    <path stroke-linecap="round" stroke-width="11" stroke="#B30000" fill="none" d="M208 342 Q204 360 216 374"></path>
    <circle fill="#FFCC33" r="9.5" cy="374" cx="216"></circle>

    <path stroke-linecap="round" stroke-width="14" stroke="#9B0000" fill="none" d="M295 300 Q323 307 332 342"></path>
    <path stroke-linecap="round" stroke-width="11" stroke="#B30000" fill="none" d="M332 342 Q336 360 324 374"></path>
    <circle fill="#FFCC33" r="9.5" cy="374" cx="324"></circle>
  </g>

  <!-- Mắt -->
  <ellipse fill="#FFEE99" ry="29" rx="24" cy="244" cx="225"></ellipse>
  <ellipse fill="#1A1A1A" ry="18.5" rx="14" cy="243" cx="231"></ellipse>
  <circle fill="#FFFFFF" r="6.8" cy="238" cx="238"></circle>

  <ellipse fill="#FFEE99" ry="29" rx="24" cy="244" cx="315"></ellipse>
  <ellipse fill="#1A1A1A" ry="18.5" rx="14" cy="243" cx="309"></ellipse>
  <circle fill="#FFFFFF" r="6.8" cy="238" cx="302"></circle>

  <!-- Mắt nhỏ -->
  <ellipse fill="#FFCC33" ry="8" rx="7" cy="231" cx="255"></ellipse>
  <ellipse fill="#FFCC33" ry="7" rx="6" cy="256" cx="255"></ellipse>
  <ellipse fill="#FFCC33" ry="8" rx="7" cy="231" cx="285"></ellipse>
  <ellipse fill="#FFCC33" ry="7" rx="6" cy="256" cx="285"></ellipse>

</svg>
