<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 500" height="500" width="540">
  <defs>
    <style>
      @keyframes legWaveA {
        0%, 100% { transform: rotate(-28deg); }
        35%      { transform: rotate(22deg); }
        65%      { transform: rotate(38deg); }
        90%      { transform: rotate(-12deg); }
      }
      @keyframes legWaveB {
        0%, 100% { transform: rotate(38deg); }
        35%      { transform: rotate(-28deg); }
        65%      { transform: rotate(-20deg); }
        90%      { transform: rotate(15deg); }
      }
      @keyframes bodyBob {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50%      { transform: translateY(-5px) rotate(1deg); }
      }
      .spider-body { animation: bodyBob 1.4s infinite ease-in-out; }
      .leg-left  { animation: legWaveA 1.2s infinite ease-in-out; transform-origin: 235px 295px; }
      .leg-right { animation: legWaveB 1.2s infinite ease-in-out; transform-origin: 305px 295px; }
    </style>
  </defs>

  
  <ellipse opacity="0.75" fill="#1A0000" ry="28" rx="120" cy="445" cx="270"></ellipse>

  
