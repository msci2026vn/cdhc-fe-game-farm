<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-1deg); } 75% { transform: rotate(1deg); } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .car { animation: bounce 0.8s infinite alternate ease-in-out; transform-origin: center; }
    .character { animation: shake 1.5s infinite alternate ease-in-out; transform-origin: center bottom; }
    .wheel { animation: wheelSpin 0.8s infinite linear; transform-origin: center; }
    .cloud { animation: cloudMove 25s infinite linear; }
  </style>
  
  <rect width="200" height="150" fill="#87CEEB" />
  <g fill="#FFF" opacity="0.6" class="cloud" transform="translate(100, 30) scale(0.5)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#4B4B4B" />
  <g stroke="#FFF" stroke-width="2" stroke-dasharray="15 15">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>
  <g fill="#7cb342"><rect x="0" y="110" width="200" height="5" /></g>

  <g class="car" transform="translate(0, 0)">
    <!-- Character: Ladybug -->
    <g class="character" transform="translate(90, 85)">
      <!-- Head -->
      <circle cx="0" cy="-15" r="14" fill="#333" />
      <circle cx="0" cy="-15" r="11" fill="#f44336" />
      <!-- Eyes w/ Sunglasses -->
      <path d="M-8,-20 Q0,-25 8,-20 L9,-15 L-9,-15 Z" fill="#111"/>
      <!-- Spots -->
      <circle cx="-5" cy="-8" r="2" fill="#111"/>
      <circle cx="4" cy="-5" r="2.5" fill="#111"/>
      <circle cx="0" cy="-24" r="2" fill="#111"/>
      <!-- Antennae -->
      <path d="M-6,-28 Q-10,-35 -15,-33" fill="none" stroke="#111" stroke-width="1.5"/>
      <circle cx="-15" cy="-33" r="1.5" fill="#111"/>
      <path d="M6,-28 Q10,-35 15,-33" fill="none" stroke="#111" stroke-width="1.5"/>
      <circle cx="15" cy="-33" r="1.5" fill="#111"/>
    </g>

    <!-- Car: Bumper Car -->
    <g transform="translate(100, 100)">
      <!-- Antenna for bumper car -->
      <line x1="-35" y1="0" x2="-35" y2="-40" stroke="#757575" stroke-width="2"/>
      <circle cx="-35" cy="-40" r="3" fill="#ffeb3b"/>
      
      <!-- Body -->
      <path d="M-45,5 Q-45,-15 0,-15 Q45,-15 45,5 Z" fill="#d32f2f" stroke="#b71c1c" stroke-width="1.5"/>
      <!-- Bumper -->
      <rect x="-50" y="2" width="100" height="8" rx="4" fill="#607d8b" stroke="#455a64" stroke-width="1.5"/>
      <!-- Steering -->
      <line x1="15" y1="-10" x2="20" y2="-18" stroke="#333" stroke-width="2"/>
      <circle cx="20" cy="-18" r="3.5" fill="#111"/>
      <!-- Headlight -->
      <ellipse cx="40" cy="-5" rx="3" ry="5" fill="#ffeb3b"/>
    </g>

    <!-- Wheels -->
    <g transform="translate(68, 105)">
      <circle cx="0" cy="0" r="9" fill="#212121" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <circle cx="0" cy="0" r="3" fill="#9e9e9e"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFF" stroke-width="1"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFF" stroke-width="1"/>
      </g>
    </g>
    <g transform="translate(132, 105)">
      <circle cx="0" cy="0" r="9" fill="#212121" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <circle cx="0" cy="0" r="3" fill="#9e9e9e"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFF" stroke-width="1"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFF" stroke-width="1"/>
      </g>
    </g>
  </g>
</svg>
