<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <radialGradient id="bodyG" cx="42%" cy="35%" r="58%">
      <stop offset="0%" stop-color="#a8e060"/>
      <stop offset="55%" stop-color="#5ab818"/>
      <stop offset="100%" stop-color="#2d7008"/>
    </radialGradient>
    <radialGradient id="bellyG" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#c8f080" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7ad830" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeL" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dddddd"/>
    </radialGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1a5000" flood-opacity="0.3"/>
    </filter>
    <filter id="bodyGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#88dd20" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <style>
      @keyframes idleBob {
        0%,100% { transform: translateY(0px); }
        50%      { transform: translateY(-10px); }
      }
      @keyframes shadowPulse {
        0%,100% { rx: 38; opacity: 0.25; }
        50%      { rx: 28; opacity: 0.12; }
      }
      @keyframes eyeBlink {
        0%,92%,100% { transform: scaleY(1); }
        95%          { transform: scaleY(0.08); }
      }
      @keyframes antennaSway {
        0%,100% { transform: rotate(0deg); }
        40%     { transform: rotate(8deg); }
        70%     { transform: rotate(-5deg); }
      }
      @keyframes legWiggle {
        0%,100% { transform: rotate(0deg); }
        50%     { transform: rotate(12deg); }
      }
      @keyframes breathe {
        0%,100% { transform: scale(1); }
        50%     { transform: scale(1.03); }
      }
      .character { animation: idleBob 2.2s ease-in-out infinite; }
      .body-group { animation: breathe 2.2s ease-in-out infinite; transform-origin: 100px 130px; }
      .eye-l { animation: eyeBlink 4s ease-in-out infinite; transform-origin: 82px 122px; }
      .eye-r { animation: eyeBlink 4s ease-in-out infinite 0.05s; transform-origin: 118px 122px; }
      .antenna-l { animation: antennaSway 3s ease-in-out infinite; transform-origin: 88px 95px; }
      .antenna-r { animation: antennaSway 3s ease-in-out infinite 0.4s; transform-origin: 112px 95px; }
      .leg-fl { animation: legWiggle 1.1s ease-in-out infinite; transform-origin: 72px 158px; }
      .leg-fr { animation: legWiggle 1.1s ease-in-out infinite 0.55s; transform-origin: 128px 158px; }
      .leg-ml { animation: legWiggle 1.1s ease-in-out infinite 0.18s; transform-origin: 65px 168px; }
      .leg-mr { animation: legWiggle 1.1s ease-in-out infinite 0.73s; transform-origin: 135px 168px; }
      .leg-bl { animation: legWiggle 1.1s ease-in-out infinite 0.36s; transform-origin: 72px 175px; }
      .leg-br { animation: legWiggle 1.1s ease-in-out infinite 0.9s; transform-origin: 128px 175px; }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="210" rx="38" ry="7" fill="#1a5000" opacity="0.25">
    <animate attributeName="rx" values="38;28;38" dur="2.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4,0,0.6,1;0.4,0,0.6,1"/>
    <animate attributeName="opacity" values="0.25;0.12;0.25" dur="2.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4,0,0.6,1;0.4,0,0.6,1"/>
  </ellipse>

  <g class="character" filter="url(#dropShadow)">

    <!-- ── LEGS (behind body) ── -->
    <!-- Back pair -->
    <g class="leg-bl">
      <line x1="80" y1="172" x2="58" y2="192" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="58" y1="192" x2="50" y2="205" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g class="leg-br">
      <line x1="120" y1="172" x2="142" y2="192" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="142" y1="192" x2="150" y2="205" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- Mid pair -->
    <g class="leg-ml">
      <line x1="74" y1="158" x2="50" y2="175" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="175" x2="42" y2="188" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g class="leg-mr">
      <line x1="126" y1="158" x2="150" y2="175" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="150" y1="175" x2="158" y2="188" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- ── BODY GROUP ── -->
    <g class="body-group">
      <!-- Abdomen blob -->
      <ellipse cx="100" cy="158" rx="32" ry="26" fill="url(#bodyG)" filter="url(#bodyGlow)"/>
      <!-- Abdomen segments -->
      <ellipse cx="100" cy="158" rx="32" ry="26" fill="none" stroke="#3a8008" stroke-width="1" stroke-dasharray="60,4" stroke-dashoffset="0" opacity="0.35"/>

      <!-- Main body -->
      <ellipse cx="100" cy="130" rx="42" ry="40" fill="url(#bodyG)" filter="url(#bodyGlow)"/>
      <!-- Belly shine -->
      <ellipse cx="100" cy="132" rx="28" ry="24" fill="url(#bellyG)"/>
      <!-- Body highlight -->
      <ellipse cx="86" cy="112" rx="12" ry="9" fill="white" opacity="0.18" transform="rotate(-20,86,112)"/>

      <!-- ── FRONT LEGS (in front of body) ── -->
      <g class="leg-fl">
        <line x1="70" y1="148" x2="48" y2="162" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
        <line x1="48" y1="162" x2="40" y2="175" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g class="leg-fr">
        <line x1="130" y1="148" x2="152" y2="162" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
        <line x1="152" y1="162" x2="160" y2="175" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
      </g>

      <!-- ── ANTENNAE ── -->
      <g class="antenna-l">
        <path d="M88,95 Q76,72 68,55" stroke="#2d7008" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="68" cy="55" r="5.5" fill="#88dd20"/>
        <circle cx="68" cy="55" r="2.5" fill="#c8ff60"/>
      </g>
      <g class="antenna-r">
        <path d="M112,95 Q124,72 132,55" stroke="#2d7008" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="132" cy="55" r="5.5" fill="#88dd20"/>
        <circle cx="132" cy="55" r="2.5" fill="#c8ff60"/>
      </g>

      <!-- ── EYES ── -->
      <!-- Left eye -->
      <circle cx="82" cy="122" r="14" fill="url(#eyeL)"/>
      <circle cx="82" cy="122" r="14" fill="none" stroke="#2d7008" stroke-width="1.5"/>
      <g class="eye-l">
        <circle cx="84" cy="124" r="8" fill="#1a1a1a"/>
        <circle cx="86" cy="121" r="3" fill="white" opacity="0.9"/>
        <circle cx="80" cy="127" r="1.5" fill="white" opacity="0.5"/>
      </g>
      <!-- Right eye -->
      <circle cx="118" cy="122" r="14" fill="url(#eyeL)"/>
      <circle cx="118" cy="122" r="14" fill="none" stroke="#2d7008" stroke-width="1.5"/>
      <g class="eye-r">
        <circle cx="120" cy="124" r="8" fill="#1a1a1a"/>
        <circle cx="122" cy="121" r="3" fill="white" opacity="0.9"/>
        <circle cx="116" cy="127" r="1.5" fill="white" opacity="0.5"/>
      </g>

      <!-- Mouth — relaxed smile -->
      <path d="M88,140 Q100,148 112,140" stroke="#2d7008" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Cheek blush -->
      <ellipse cx="68" cy="132" rx="8" ry="5" fill="#ff9090" opacity="0.25"/>
      <ellipse cx="132" cy="132" rx="8" ry="5" fill="#ff9090" opacity="0.25"/>
    </g>

  </g>
</svg>
