<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <radialGradient id="bodyG" cx="42%" cy="35%" r="58%">
      <stop offset="0%" stop-color="#c8f040"/>
      <stop offset="55%" stop-color="#6acc18"/>
      <stop offset="100%" stop-color="#2d7008"/>
    </radialGradient>
    <radialGradient id="eyeAngry" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffeeee"/>
      <stop offset="100%" stop-color="#ffcccc"/>
    </radialGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1a5000" flood-opacity="0.3"/>
    </filter>
    <filter id="angryGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff4400" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <filter id="speedBlur">
      <feGaussianBlur stdDeviation="3,1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      @keyframes lunge {
        0%   { transform: translateX(0px) translateY(0px) scaleX(1); }
        30%  { transform: translateX(-18px) translateY(4px) scaleX(0.88); }
        55%  { transform: translateX(28px) translateY(-14px) scaleX(1.18); }
        75%  { transform: translateX(22px) translateY(-10px) scaleX(1.12); }
        100% { transform: translateX(0px) translateY(0px) scaleX(1); }
      }
      @keyframes eyeAngry {
        0%,100% { transform: scaleY(1); }
        55%     { transform: scaleY(1.3); }
      }
      @keyframes antennaAttack {
        0%,100% { transform: rotate(0deg); }
        40%     { transform: rotate(-25deg); }
        70%     { transform: rotate(10deg); }
      }
      @keyframes legKick {
        0%,100% { transform: rotate(0deg); }
        40%     { transform: rotate(-30deg); }
        70%     { transform: rotate(20deg); }
      }
      @keyframes impactFlash {
        0%,45%,100% { opacity: 0; }
        55%,80%     { opacity: 1; }
      }
      @keyframes speedLineMove {
        0%   { opacity: 0; transform: translateX(30px); }
        30%  { opacity: 0.8; transform: translateX(0px); }
        60%  { opacity: 0.9; transform: translateX(-10px); }
        100% { opacity: 0; transform: translateX(-40px); }
      }
      .character   { animation: lunge 0.7s cubic-bezier(0.2,0,0.8,1) infinite; transform-origin: 100px 130px; }
      .eye-l       { animation: eyeAngry 0.7s ease-in-out infinite; transform-origin: 82px 122px; }
      .eye-r       { animation: eyeAngry 0.7s ease-in-out infinite 0.03s; transform-origin: 118px 122px; }
      .antenna-l   { animation: antennaAttack 0.7s ease-in-out infinite; transform-origin: 88px 95px; }
      .antenna-r   { animation: antennaAttack 0.7s ease-in-out infinite 0.06s; transform-origin: 112px 95px; }
      .leg-fl      { animation: legKick 0.7s ease-in-out infinite; transform-origin: 70px 148px; }
      .leg-fr      { animation: legKick 0.7s ease-in-out infinite 0.35s; transform-origin: 130px 148px; }
      .leg-ml      { animation: legKick 0.7s ease-in-out infinite 0.12s; transform-origin: 74px 158px; }
      .leg-mr      { animation: legKick 0.7s ease-in-out infinite 0.47s; transform-origin: 126px 158px; }
      .leg-bl      { animation: legKick 0.7s ease-in-out infinite 0.23s; transform-origin: 80px 172px; }
      .leg-br      { animation: legKick 0.7s ease-in-out infinite 0.58s; transform-origin: 120px 172px; }
      .impact      { animation: impactFlash 0.7s ease-out infinite; }
      .speed-line  { animation: speedLineMove 0.7s ease-in-out infinite; }
      .speed-line2 { animation: speedLineMove 0.7s ease-in-out infinite 0.08s; }
      .speed-line3 { animation: speedLineMove 0.7s ease-in-out infinite 0.16s; }
    </style>
  </defs>

  <!-- Ground shadow (elongated during lunge) -->
  <ellipse cx="100" cy="210" rx="38" ry="6" fill="#1a5000" opacity="0.2">
    <animate attributeName="rx" values="38;52;38" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;112;100" dur="0.7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── SPEED LINES ── -->
  <g>
    <line class="speed-line"  x1="30" y1="110" x2="80" y2="110" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0"/>
    <line class="speed-line2" x1="22" y1="125" x2="72" y2="125" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0"/>
    <line class="speed-line3" x1="28" y1="140" x2="75" y2="140" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0"/>
    <line class="speed-line"  x1="18" y1="98"  x2="65" y2="98"  stroke="#aaffaa" stroke-width="1.5" stroke-linecap="round" opacity="0"/>
    <line class="speed-line3" x1="25" y1="152" x2="68" y2="152" stroke="#aaffaa" stroke-width="1"   stroke-linecap="round" opacity="0"/>
  </g>

  <!-- ── IMPACT BURST (right side, where enemy gets hit) ── -->
  <g class="impact" transform="translate(168,118)">
    <circle cx="0" cy="0" r="18" fill="#ffdd00" opacity="0.7"/>
    <line x1="0" y1="0" x2="22"  y2="-14" stroke="#ff8800" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="26"  y2="2"   stroke="#ffdd00" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="20"  y2="18"  stroke="#ff8800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-8"  y2="22"  stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14"  y2="-22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="bold" fill="white" opacity="0.9">!</text>
  </g>

  <g class="character" filter="url(#dropShadow)">

    <!-- Back legs -->
    <g class="leg-bl">
      <line x1="80"  y1="172" x2="54"  y2="195" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="54"  y1="195" x2="44"  y2="210" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g class="leg-br">
      <line x1="120" y1="172" x2="148" y2="195" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="148" y1="195" x2="158" y2="210" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- Mid legs -->
    <g class="leg-ml">
      <line x1="74"  y1="158" x2="48"  y2="178" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="48"  y1="178" x2="38"  y2="192" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g class="leg-mr">
      <line x1="126" y1="158" x2="152" y2="178" stroke="#3a8008" stroke-width="5" stroke-linecap="round"/>
      <line x1="152" y1="178" x2="162" y2="192" stroke="#2d6508" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Body -->
    <ellipse cx="100" cy="158" rx="32" ry="26" fill="url(#bodyG)" filter="url(#angryGlow)"/>
    <ellipse cx="100" cy="130" rx="42" ry="40" fill="url(#bodyG)" filter="url(#angryGlow)"/>
    <!-- Body squash highlight -->
    <ellipse cx="88" cy="114" rx="10" ry="7" fill="white" opacity="0.2" transform="rotate(-15,88,114)"/>

    <!-- Angry red flush -->
    <ellipse cx="100" cy="130" rx="42" ry="40" fill="#ff4400" opacity="0.12"/>

    <!-- Front legs (thrusting forward) -->
    <g class="leg-fl">
      <line x1="70"  y1="148" x2="42"  y2="160" stroke="#3a8008" stroke-width="6" stroke-linecap="round"/>
      <line x1="42"  y1="160" x2="28"  y2="170" stroke="#2d6508" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g class="leg-fr">
      <line x1="130" y1="148" x2="158" y2="158" stroke="#3a8008" stroke-width="6" stroke-linecap="round"/>
      <line x1="158" y1="158" x2="172" y2="168" stroke="#2d6508" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- Antennae swept forward -->
    <g class="antenna-l">
      <path d="M88,95 Q72,68 60,48" stroke="#2d7008" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="60" cy="48" r="5.5" fill="#ff6600"/>
      <circle cx="60" cy="48" r="2.5" fill="#ffcc00"/>
    </g>
    <g class="antenna-r">
      <path d="M112,95 Q128,68 140,48" stroke="#2d7008" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="140" cy="48" r="5.5" fill="#ff6600"/>
      <circle cx="140" cy="48" r="2.5" fill="#ffcc00"/>
    </g>

    <!-- Eyes — angry wide -->
    <!-- Left eye -->
    <circle cx="82" cy="122" r="14" fill="url(#eyeAngry)"/>
    <circle cx="82" cy="122" r="14" fill="none" stroke="#2d7008" stroke-width="1.5"/>
    <!-- Angry brow -->
    <path d="M70,110 L94,115" stroke="#2d7008" stroke-width="3" stroke-linecap="round"/>
    <g class="eye-l">
      <circle cx="84" cy="124" r="9" fill="#cc1100"/>
      <circle cx="87" cy="121" r="3.5" fill="white" opacity="0.9"/>
    </g>
    <!-- Right eye -->
    <circle cx="118" cy="122" r="14" fill="url(#eyeAngry)"/>
    <circle cx="118" cy="122" r="14" fill="none" stroke="#2d7008" stroke-width="1.5"/>
    <!-- Angry brow -->
    <path d="M106,115 L130,110" stroke="#2d7008" stroke-width="3" stroke-linecap="round"/>
    <g class="eye-r">
      <circle cx="120" cy="124" r="9" fill="#cc1100"/>
      <circle cx="123" cy="121" r="3.5" fill="white" opacity="0.9"/>
    </g>

    <!-- Angry mouth open -->
    <path d="M86,140 Q100,152 114,140" stroke="#1a4000" stroke-width="2.5" fill="#1a4000" stroke-linecap="round"/>
    <!-- Fangs -->
    <path d="M91,140 L89,148" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M100,143 L100,151" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M109,140 L111,148" stroke="white" stroke-width="2" stroke-linecap="round"/>

  </g>
</svg>
