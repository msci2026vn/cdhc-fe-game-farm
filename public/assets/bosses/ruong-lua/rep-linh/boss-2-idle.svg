<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <radialGradient id="bodyG" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#7acc30"/>
      <stop offset="50%" stop-color="#3a8808"/>
      <stop offset="100%" stop-color="#1a4a00"/>
    </radialGradient>
    <radialGradient id="armorG" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#d0d8c0"/>
      <stop offset="45%" stop-color="#8a9880"/>
      <stop offset="100%" stop-color="#404830"/>
    </radialGradient>
    <radialGradient id="helmetG" cx="35%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#c8d0b8"/>
      <stop offset="50%" stop-color="#708060"/>
      <stop offset="100%" stop-color="#303820"/>
    </radialGradient>
    <radialGradient id="shieldG" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#c0c8b8"/>
      <stop offset="50%" stop-color="#688058"/>
      <stop offset="100%" stop-color="#283818"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddeecc"/>
    </radialGradient>
    <linearGradient id="spearG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d080"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1a3000" flood-opacity="0.35"/>
    </filter>
    <filter id="armorShine">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bodyGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#60aa10" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <style>
      @keyframes soldierBob {
        0%,100% { transform: translateY(0px); }
        50%     { transform: translateY(-9px); }
      }
      @keyframes shadowPulse {
        0%,100% { rx:42; opacity:0.28; }
        50%     { rx:30; opacity:0.13; }
      }
      @keyframes eyeBlink {
        0%,90%,100% { transform:scaleY(1); }
        94%          { transform:scaleY(0.06); }
      }
      @keyframes antennaMarching {
        0%,100% { transform:rotate(0deg); }
        35%     { transform:rotate(6deg); }
        70%     { transform:rotate(-4deg); }
      }
      @keyframes spearSway {
        0%,100% { transform:rotate(0deg); }
        40%     { transform:rotate(3deg); }
        70%     { transform:rotate(-2deg); }
      }
      @keyframes armorGlint {
        0%,80%,100% { opacity:0; }
        85%,95%     { opacity:0.6; }
      }
      @keyframes legMarch {
        0%,100% { transform:rotate(0deg); }
        50%     { transform:rotate(10deg); }
      }
      @keyframes breathe {
        0%,100% { transform:scale(1); }
        50%     { transform:scale(1.025); }
      }
      .character   { animation: soldierBob 2.4s ease-in-out infinite; }
      .body-group  { animation: breathe 2.4s ease-in-out infinite; transform-origin:100px 135px; }
      .eye-l       { animation: eyeBlink 5s ease-in-out infinite; transform-origin:83px 124px; }
      .eye-r       { animation: eyeBlink 5s ease-in-out infinite 0.07s; transform-origin:117px 124px; }
      .ant-l       { animation: antennaMarching 3.2s ease-in-out infinite; transform-origin:90px 96px; }
      .ant-r       { animation: antennaMarching 3.2s ease-in-out infinite 0.5s; transform-origin:110px 96px; }
      .spear       { animation: spearSway 2.4s ease-in-out infinite; transform-origin:155px 100px; }
      .armor-glint { animation: armorGlint 4s ease-in-out infinite; }
      .leg-fl      { animation: legMarch 1.2s ease-in-out infinite; transform-origin:70px 150px; }
      .leg-fr      { animation: legMarch 1.2s ease-in-out infinite 0.6s; transform-origin:130px 150px; }
      .leg-ml      { animation: legMarch 1.2s ease-in-out infinite 0.2s; transform-origin:65px 162px; }
      .leg-mr      { animation: legMarch 1.2s ease-in-out infinite 0.8s; transform-origin:135px 162px; }
      .leg-bl      { animation: legMarch 1.2s ease-in-out infinite 0.4s; transform-origin:72px 172px; }
      .leg-br      { animation: legMarch 1.2s ease-in-out infinite 1.0s; transform-origin:128px 172px; }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="212" rx="42" ry="7" fill="#1a3000" opacity="0.28">
    <animate attributeName="rx" values="42;30;42" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4,0,0.6,1;0.4,0,0.6,1"/>
    <animate attributeName="opacity" values="0.28;0.13;0.28" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4,0,0.6,1;0.4,0,0.6,1"/>
  </ellipse>

  <g class="character" filter="url(#dropShadow)">

    <!-- ── SPEAR (right hand, behind body) ── -->
    <g class="spear">
      <!-- Shaft -->
      <rect x="148" y="70" width="6" height="110" rx="3" fill="url(#spearG)"/>
      <!-- Tip -->
      <polygon points="151,58 145,78 157,78" fill="#c0c8d0"/>
      <polygon points="151,58 148,70 154,70" fill="#e0e8f0"/>
      <!-- Butt cap -->
      <ellipse cx="151" cy="180" rx="4" ry="4" fill="#806020"/>
      <!-- Cross-guard decoration -->
      <rect x="142" y="108" width="18" height="5" rx="2.5" fill="#9aaa80"/>
      <rect x="143" y="109" width="16" height="3" rx="1.5" fill="#c0d0a0" opacity="0.5"/>
    </g>

    <!-- ── BACK LEGS ── -->
    <g class="leg-bl">
      <line x1="80" y1="170" x2="55" y2="192" stroke="#2a6000" stroke-width="5" stroke-linecap="round"/>
      <line x1="55" y1="192" x2="46" y2="207" stroke="#1e4800" stroke-width="4" stroke-linecap="round"/>
      <!-- Leg armor plates -->
      <rect x="60" y="185" width="12" height="6" rx="3" fill="#7a8870" opacity="0.8" transform="rotate(-45,66,188)"/>
    </g>
    <g class="leg-br">
      <line x1="120" y1="170" x2="145" y2="192" stroke="#2a6000" stroke-width="5" stroke-linecap="round"/>
      <line x1="145" y1="192" x2="154" y2="207" stroke="#1e4800" stroke-width="4" stroke-linecap="round"/>
      <rect x="128" y="185" width="12" height="6" rx="3" fill="#7a8870" opacity="0.8" transform="rotate(45,134,188)"/>
    </g>

    <!-- Mid legs -->
    <g class="leg-ml">
      <line x1="72" y1="158" x2="48" y2="178" stroke="#2a6000" stroke-width="5" stroke-linecap="round"/>
      <line x1="48" y1="178" x2="38" y2="192" stroke="#1e4800" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g class="leg-mr">
      <line x1="128" y1="158" x2="152" y2="178" stroke="#2a6000" stroke-width="5" stroke-linecap="round"/>
      <line x1="152" y1="178" x2="162" y2="192" stroke="#1e4800" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g class="body-group">
      <!-- ── ABDOMEN with armor banding ── -->
      <ellipse cx="100" cy="165" rx="33" ry="25" fill="url(#bodyG)" filter="url(#bodyGlow)"/>
      <!-- Abdomen armor bands -->
      <path d="M68,160 Q100,155 132,160" stroke="#6a8850" stroke-width="3" fill="none" opacity="0.6"/>
      <path d="M69,170 Q100,165 131,170" stroke="#6a8850" stroke-width="3" fill="none" opacity="0.5"/>
      <!-- Abdomen back plate -->
      <ellipse cx="100" cy="163" rx="22" ry="14" fill="url(#armorG)" opacity="0.55"/>
      <ellipse cx="95" cy="158" rx="8" ry="5" fill="white" opacity="0.12" transform="rotate(-10,95,158)"/>

      <!-- ── MAIN BODY ── -->
      <ellipse cx="100" cy="132" rx="42" ry="40" fill="url(#bodyG)" filter="url(#bodyGlow)"/>

      <!-- ── CHEST ARMOR PLATE ── -->
      <path d="M72,118 Q100,108 128,118 L130,148 Q100,158 70,148 Z" fill="url(#armorG)" opacity="0.88"/>
      <!-- Armor rivets -->
      <circle cx="80" cy="122" r="3" fill="#909888" opacity="0.9"/>
      <circle cx="120" cy="122" r="3" fill="#909888" opacity="0.9"/>
      <circle cx="100" cy="120" r="3" fill="#909888" opacity="0.9"/>
      <circle cx="80" cy="144" r="3" fill="#909888" opacity="0.9"/>
      <circle cx="120" cy="144" r="3" fill="#909888" opacity="0.9"/>
      <!-- Armor center crease -->
      <line x1="100" y1="110" x2="100" y2="156" stroke="#506040" stroke-width="1.5" opacity="0.5"/>
      <!-- Armor shine -->
      <path d="M78,116 Q88,112 92,120" stroke="white" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
      <ellipse class="armor-glint" cx="88" cy="126" rx="5" ry="3" fill="white" opacity="0" transform="rotate(-30,88,126)"/>

      <!-- ── SHIELD (left arm) ── -->
      <g transform="translate(52,128)">
        <!-- Shield body -->
        <path d="M0,-26 L18,-22 L20,10 Q10,24 0,28 Q-10,24 -20,10 L-18,-22 Z" fill="url(#shieldG)"/>
        <!-- Shield border -->
        <path d="M0,-26 L18,-22 L20,10 Q10,24 0,28 Q-10,24 -20,10 L-18,-22 Z" fill="none" stroke="#405030" stroke-width="2"/>
        <!-- Shield emblem — star -->
        <path d="M0,-8 L2.4,-1.2 L9.6,-1.2 L3.6,2.8 L5.8,9.6 L0,5.6 L-5.8,9.6 L-3.6,2.8 L-9.6,-1.2 L-2.4,-1.2 Z"
              fill="#c8e080" opacity="0.9"/>
        <!-- Shield highlight -->
        <path d="M-8,-20 Q-2,-14 0,-5" stroke="white" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
        <!-- Arm holding shield -->
        <line x1="0" y1="-5" x2="-18" y2="5" stroke="#2a6000" stroke-width="6" stroke-linecap="round"/>
      </g>

      <!-- Front legs (right holds spear, left holds shield) -->
      <g class="leg-fl">
        <!-- Left arm (to shield) -->
        <line x1="72" y1="145" x2="50" y2="130" stroke="#2a6000" stroke-width="6" stroke-linecap="round"/>
      </g>
      <g class="leg-fr">
        <!-- Right arm (to spear) -->
        <line x1="128" y1="140" x2="148" y2="118" stroke="#2a6000" stroke-width="6" stroke-linecap="round"/>
        <!-- Gauntlet -->
        <circle cx="148" cy="118" r="7" fill="#7a8870"/>
        <circle cx="148" cy="118" r="5" fill="#9aaa88"/>
      </g>

      <!-- ── ANTENNAE ── -->
      <g class="ant-l">
        <path d="M90,96 Q76,72 68,52" stroke="#1e5000" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <!-- Antenna tip bulb -->
        <circle cx="68" cy="52" r="5" fill="#5a9020"/>
        <circle cx="68" cy="52" r="2.5" fill="#aadd50"/>
      </g>
      <g class="ant-r">
        <path d="M110,96 Q124,72 132,52" stroke="#1e5000" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <circle cx="132" cy="52" r="5" fill="#5a9020"/>
        <circle cx="132" cy="52" r="2.5" fill="#aadd50"/>
      </g>

      <!-- ── HELMET ── -->
      <!-- Helmet dome -->
      <path d="M68,104 Q68,72 100,68 Q132,72 132,104 Z" fill="url(#helmetG)"/>
      <!-- Helmet visor rim -->
      <path d="M65,104 L135,104" stroke="#405030" stroke-width="3" stroke-linecap="round"/>
      <!-- Visor slit -->
      <path d="M70,104 L130,104" stroke="#202818" stroke-width="5" stroke-linecap="round"/>
      <!-- Helmet side flanges -->
      <path d="M68,96 L58,105 L68,108" fill="#607050"/>
      <path d="M132,96 L142,105 L132,108" fill="#607050"/>
      <!-- Helmet crest / plume -->
      <path d="M100,68 Q95,50 88,38 Q100,44 112,38 Q105,50 100,68Z" fill="#cc2020"/>
      <path d="M100,68 Q96,52 90,40" stroke="#ff4444" stroke-width="1.5" fill="none" opacity="0.5"/>
      <!-- Helmet rivets -->
      <circle cx="80" cy="90" r="2.5" fill="#909888"/>
      <circle cx="120" cy="90" r="2.5" fill="#909888"/>
      <circle cx="100" cy="80" r="2.5" fill="#909888"/>
      <!-- Helmet highlight -->
      <path d="M80,76 Q90,72 96,80" stroke="white" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
      <ellipse class="armor-glint" cx="85" cy="82" rx="6" ry="3" fill="white" opacity="0" transform="rotate(-25,85,82)"/>

      <!-- ── EYES (under visor) ── -->
      <!-- Eye glow in visor slit -->
      <circle cx="85" cy="104" r="6" fill="#ff4400" opacity="0.9"/>
      <circle cx="115" cy="104" r="6" fill="#ff4400" opacity="0.9"/>
      <g class="eye-l">
        <circle cx="85" cy="104" r="4" fill="#ff8820"/>
        <circle cx="87" cy="102" r="1.8" fill="white" opacity="0.9"/>
      </g>
      <g class="eye-r">
        <circle cx="115" cy="104" r="4" fill="#ff8820"/>
        <circle cx="117" cy="102" r="1.8" fill="white" opacity="0.9"/>
      </g>

      <!-- Visor overlay (semi-transparent) -->
      <path d="M70,104 L130,104" stroke="#101808" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

      <!-- Neck guard -->
      <path d="M76,108 Q100,115 124,108 L122,118 Q100,124 78,118 Z" fill="url(#armorG)" opacity="0.9"/>

    </g><!-- end body-group -->
  </g><!-- end character -->
</svg>
