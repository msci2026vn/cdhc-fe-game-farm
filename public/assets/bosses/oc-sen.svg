<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes glide { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes thrust { 0%, 100% { transform: scaleX(1); opacity: 0.8; } 50% { transform: scaleX(1.3); opacity: 1; } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .board { animation: glide 0.8s infinite alternate ease-in-out; transform-origin: center; }
    .wheel { animation: wheelSpin 0.3s infinite linear; transform-origin: center; }
    .rocket { animation: thrust 0.1s infinite alternate linear; transform-origin: right center; }
    .cloud { animation: cloudMove 15s infinite linear; }
  </style>
  
  <rect width="200" height="150" fill="#e0f7fa" />
  <g fill="#FFF" opacity="0.8" class="cloud" transform="translate(150, 20) scale(0.6)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#4B4B4B" />
  <g stroke="#FFF" stroke-width="2" stroke-dasharray="10 10">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>

  <g class="board" transform="translate(0, 5)">
    <!-- Rocket Flame -->
    <g transform="translate(40, 102)">
      <path d="M-30,-5 L0,0 L-30,5 Z" fill="#ff3d00" class="rocket"/>
      <path d="M-20,-2 L0,0 L-20,2 Z" fill="#ffeb3b" class="rocket"/>
    </g>

    <!-- Character: Snail -->
    <g transform="translate(90, 85)">
      <!-- Shell -->
      <circle cx="-15" cy="0" r="20" fill="#a1887f" stroke="#5d4037" stroke-width="2"/>
      <path d="M-15,0 Q0,5 -5,-15 Q-15,-20 -25,-10 Q-35,5 -20,15" fill="none" stroke="#795548" stroke-width="3"/>
      <!-- Body -->
      <path d="M-15,15 Q5,15 20,5 Q25,0 20,-10 Q15,-15 15,0 Q15,5 -20,10 Z" fill="#ffcc80" stroke="#f57c00" stroke-width="1.5"/>
      <!-- Eye stalks -->
      <line x1="18" y1="-5" x2="25" y2="-20" stroke="#ffcc80" stroke-width="1.5"/>
      <circle cx="25" cy="-20" r="3" fill="#FFF" stroke="#333" stroke-width="1"/>
      <circle cx="26" cy="-20" r="1.5" fill="#333"/>
      <line x1="22" y1="-2" x2="32" y2="-12" stroke="#ffcc80" stroke-width="1.5"/>
      <circle cx="32" cy="-12" r="3" fill="#FFF" stroke="#333" stroke-width="1"/>
      <circle cx="33" cy="-12" r="1.5" fill="#333"/>
      <!-- Backwards Cap -->
      <path d="M12,-25 C 10,-35 25,-35 25,-25 Z" fill="#2196f3"/>
      <rect x="5" y="-27" width="10" height="3" rx="1" fill="#1976d2" transform="rotate(-15, 10, -27)"/>
    </g>

    <!-- Skateboard Base -->
    <g transform="translate(100, 105)">
      <rect x="-40" y="-3" width="70" height="6" rx="3" fill="#f44336" stroke="#c62828" stroke-width="1.5"/>
      <!-- Rocket Thruster attached -->
      <rect x="-55" y="-6" width="20" height="12" rx="2" fill="#757575" stroke="#424242" stroke-width="1.5"/>
    </g>

    <!-- Small Skateboard Wheels -->
    <g transform="translate(75, 110)">
      <circle cx="0" cy="0" r="4" fill="#b0bec5" stroke="#263238" stroke-width="1" class="wheel"/>
    </g>
    <g transform="translate(115, 110)">
      <circle cx="0" cy="0" r="4" fill="#b0bec5" stroke="#263238" stroke-width="1" class="wheel"/>
    </g>
  </g>
</svg>
