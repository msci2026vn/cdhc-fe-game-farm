<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes steering { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .car { animation: bump 1.5s infinite alternate ease-in-out; transform-origin: center; }
    .wheel { animation: wheelSpin 2s infinite linear; transform-origin: center; }
    .steer { animation: steering 2s infinite alternate ease-in-out; transform-origin: left bottom; }
    .cloud { animation: cloudMove 30s infinite linear; }
  </style>
  
  <rect width="200" height="150" fill="#ffecb3" />
  <!-- Sun -->
  <circle cx="160" cy="30" r="20" fill="#ffb300" opacity="0.8"/>
  <g fill="#FFF" opacity="0.6" class="cloud" transform="translate(80, 20) scale(0.6)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#4B4B4B" />
  <g stroke="#FFF" stroke-width="2" stroke-dasharray="25 10">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>

  <g class="car" transform="translate(0, -3)">
    <!-- Tractor Body base for character positioning -->
    <!-- Character: Mouse -->
    <g transform="translate(85, 80)">
      <!-- Body/Head -->
      <circle cx="0" cy="-25" r="16" fill="#9e9e9e" stroke="#616161" stroke-width="1.5"/>
      <!-- Ears -->
      <circle cx="-12" cy="-35" r="8" fill="#9e9e9e" stroke="#616161" stroke-width="1.5"/>
      <circle cx="-12" cy="-35" r="4" fill="#f8bbd0"/>
      <circle cx="12" cy="-35" r="8" fill="#9e9e9e" stroke="#616161" stroke-width="1.5"/>
      <circle cx="12" cy="-35" r="4" fill="#f8bbd0"/>
      <!-- Snout -->
      <path d="M5,-25 Q15,-20 20,-22 Q15,-15 5,-15" fill="#e0e0e0" stroke="#616161" stroke-width="1"/>
      <circle cx="20" cy="-22" r="3" fill="#333"/>
      <!-- Eyes w/ Pilot Goggles -->
      <circle cx="-2" cy="-28" r="4" fill="#333"/>
      <circle cx="8" cy="-28" r="4" fill="#333"/>
      <!-- Goggle strap & frame -->
      <path d="M-15,-28 L15,-28" stroke="#424242" stroke-width="2"/>
    </g>

    <!-- Tractor -->
    <g transform="translate(100, 95)">
      <!-- Main cabin base -->
      <rect x="-35" y="-15" width="30" height="25" fill="#0288d1" stroke="#01579b" stroke-width="1.5"/>
      <polygon points="-35,-15 -5,-15 -5,-35 -30,-35" fill="rgba(255,255,255,0.7)" stroke="#01579b" stroke-width="1.5" opacity="0.6"/>
      <!-- Engine Hood -->
      <rect x="-5" y="0" width="40" height="10" fill="#03a9f4" stroke="#01579b" stroke-width="1.5"/>
      <!-- Smoke Pipe -->
      <rect x="25" y="-15" width="5" height="15" fill="#424242"/>
      <!-- Roof -->
      <rect x="-38" y="-38" width="38" height="4" rx="1" fill="#01579b"/>
      <!-- Steering -->
      <g class="steer" transform="translate(0, -10)">
        <line x1="0" y1="0" x2="8" y2="-5" stroke="#333" stroke-width="2"/>
        <circle cx="8" cy="-5" r="3.5" fill="#212121"/>
      </g>
    </g>

    <!-- Wheels (Big back, small front) -->
    <g transform="translate(75, 100)">
      <circle cx="0" cy="0" r="16" fill="#212121" stroke="#fbc02d" stroke-width="2" />
      <g class="wheel">
        <circle cx="0" cy="0" r="8" fill="#cfd8dc"/>
        <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFF" stroke-width="2"/>
        <line x1="0" y1="-12" x2="0" y2="12" stroke="#FFF" stroke-width="2"/>
      </g>
    </g>
    <g transform="translate(125, 110)">
      <circle cx="0" cy="0" r="9" fill="#212121" stroke="#fbc02d" stroke-width="2" />
      <g class="wheel">
        <circle cx="0" cy="0" r="4" fill="#cfd8dc"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFF" stroke-width="1.5"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFF" stroke-width="1.5"/>
      </g>
    </g>
  </g>
</svg>
