<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes leafWobble { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .car { animation: bounce 1.1s infinite alternate ease-in-out; transform-origin: center; }
    .character { animation: bounce 1.3s infinite alternate ease-in-out reverse; transform-origin: center bottom; }
    .wheel { animation: wheelSpin 1.5s infinite linear; transform-origin: center; }
    .car-body { animation: leafWobble 2s infinite ease-in-out; transform-origin: center; }
    .cloud { animation: cloudMove 20s infinite linear; }
    .cloud2 { animation: cloudMove 15s infinite linear reverse; }
  </style>
  
  <rect width="200" height="150" fill="#87CEEB" />
  <!-- Clouds -->
  <g fill="#FFF" opacity="0.8" class="cloud" transform="translate(150, 20) scale(0.6)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>
  <g fill="#FFF" opacity="0.6" class="cloud2" transform="translate(50, 40) scale(0.4)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#4B4B4B" />
  <g stroke="#FFF" stroke-width="2" stroke-dasharray="15 15">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>
  <g fill="#7cb342"><rect x="0" y="110" width="200" height="5" /></g>

  <g class="car" transform="translate(0, 0)">
    <!-- Character: Aphid -->
    <g class="character" transform="translate(100, 85)">
      <!-- Body segments -->
      <circle cx="-5" cy="-10" r="14" fill="#8bc34a" stroke="#558b2f" stroke-width="1.5"/>
      <circle cx="5" cy="-8" r="15" fill="#9ccc65" stroke="#558b2f" stroke-width="1.5"/>
      <circle cx="0" cy="-22" r="16" fill="#aed581" stroke="#558b2f" stroke-width="1.5"/>
      <!-- Eyes & Glasses -->
      <circle cx="-5" cy="-25" r="4" fill="#333"/>
      <circle cx="7" cy="-25" r="4" fill="#333"/>
      <!-- Sunglasses frame -->
      <path d="M-10,-25 Q0,-30 12,-25" fill="none" stroke="#222" stroke-width="1"/>
      <path d="M-8,-25 A 4 4 0 0 0 -2,-25 Z" fill="#111"/>
      <path d="M4,-25 A 4 4 0 0 0 10,-25 Z" fill="#111"/>
      <!-- Mouth -->
      <path d="M-3,-16 Q0,-13 4,-16" fill="none" stroke="#333" stroke-width="1.5"/>
      <!-- Antennae -->
      <path d="M-5,-38 Q-12,-48 -8,-52" fill="none" stroke="#558b2f" stroke-width="1.5"/>
      <path d="M5,-38 Q12,-48 8,-52" fill="none" stroke="#558b2f" stroke-width="1.5"/>
      <!-- Scarf/Cape -->
      <path d="M-12,-15 Q-30,-5 -25,5 Q-15,0 -12,-10 Z" fill="#ff5252"/>
    </g>

    <!-- Car: Leaf Kart -->
    <g class="car-body" transform="translate(100, 100)">
      <path d="M-45,0 Q0,15 45,0 Q55,-15 15,-15 Q-55,-15 -45,0 Z" fill="#4caf50" stroke="#2e7d32" stroke-width="1.5"/>
      <path d="M-45,0 Q0,-5 45,0" fill="none" stroke="#2e7d32" stroke-width="1.5" opacity="0.4"/>
      <!-- Steering wheel -->
      <line x1="20" y1="-5" x2="30" y2="-15" stroke="#333" stroke-width="2"/>
      <circle cx="30" cy="-15" r="4" fill="#d32f2f"/>
    </g>

    <!-- Wheels -->
    <g transform="translate(68, 105)">
      <circle cx="0" cy="0" r="11" fill="#333" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFF" stroke-width="1.5"/>
        <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFF" stroke-width="1.5"/>
      </g>
    </g>
    <g transform="translate(125, 105)">
      <circle cx="0" cy="0" r="11" fill="#333" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFF" stroke-width="1.5"/>
        <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFF" stroke-width="1.5"/>
      </g>
    </g>
  </g>
</svg>
