<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes hop { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-3px) rotate(-2deg); } }
    @keyframes wheelSpin { 100% { transform: rotate(360deg); } }
    @keyframes cloudMove { 0% { transform: translateX(200px); } 100% { transform: translateX(-100px); } }
    .car { animation: hop 0.6s infinite alternate ease-in-out; transform-origin: center; }
    .wheel { animation: wheelSpin 0.6s infinite linear; transform-origin: center; }
    .cloud { animation: cloudMove 18s infinite linear; }
  </style>
  
  <rect width="200" height="150" fill="#87CEEB" />
  <g fill="#FFF" opacity="0.7" class="cloud" transform="translate(120, 40) scale(0.6)">
    <circle cx="20" cy="20" r="20"/><circle cx="50" cy="20" r="25"/><circle cx="80" cy="20" r="20"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="115" width="200" height="35" fill="#4B4B4B" />
  <g stroke="#FFF" stroke-width="2" stroke-dasharray="20 15">
    <line x1="0" y1="130" x2="200" y2="130" />
  </g>

  <g class="car" transform="translate(0, -5)">
    <!-- Character: Grasshopper -->
    <g transform="translate(90, 80)">
      <!-- Long Body -->
      <path d="M-10,-20 Q-20,0 -5,20 Q10,0 -5,-20 Z" fill="#8bc34a" stroke="#689f38" stroke-width="1.5"/>
      <!-- Head -->
      <circle cx="-5" cy="-25" r="12" fill="#689f38" stroke="#33691e" stroke-width="1.5"/>
      <!-- Eyes w/ Shades -->
      <rect x="-12" y="-30" width="12" height="6" fill="#111" rx="2" transform="rotate(-15, -12, -30)"/>
      <!-- Antennae -->
      <path d="M0,-35 Q10,-50 15,-45" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
      <path d="M-5,-37 Q5,-55 8,-50" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
      <!-- Leg -->
      <path d="M-5,0 L-25,-15 L-20,20" fill="none" stroke="#558b2f" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Scooter -->
    <g transform="translate(100, 105)">
      <!-- Base -->
      <rect x="-35" y="0" width="60" height="5" rx="2" fill="#00bcd4" stroke="#00838f" stroke-width="1.5"/>
      <!-- Rear cowl -->
      <path d="M-35,0 Q-40,-15 -20,-15 L-10,0 Z" fill="#26c6da" stroke="#00838f" stroke-width="1.5"/>
      <!-- Front shield / Handle -->
      <path d="M20,0 L15,-30 L25,-30 L25,0 Z" fill="#26c6da" stroke="#00838f" stroke-width="1.5"/>
      <line x1="15" y1="-30" x2="5" y2="-28" stroke="#424242" stroke-width="2"/>
      <circle cx="5" cy="-28" r="3" fill="#111"/>
    </g>

    <!-- Wheels -->
    <g transform="translate(75, 110)">
      <circle cx="0" cy="0" r="8" fill="#212121" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFF" stroke-width="1.5"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFF" stroke-width="1.5"/>
      </g>
    </g>
    <g transform="translate(120, 110)">
      <circle cx="0" cy="0" r="8" fill="#212121" stroke="#FFF" stroke-width="1.5" />
      <g class="wheel">
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFF" stroke-width="1.5"/>
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFF" stroke-width="1.5"/>
      </g>
    </g>
  </g>
</svg>
